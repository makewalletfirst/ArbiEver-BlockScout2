name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  validate-and-build:
    name: Validate and Build Proxy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env for validation
        run: |
          echo "POSTGRES_PASSWORD=dummypotato123" > .env
          echo "SECRET_KEY_BASE=dummysecretbase12345678901234567890123456789012" >> .env

      - name: Validate Docker Compose Configuration
        run: |
          docker compose config

      - name: Build Docker Proxy Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.proxy
          push: false
          tags: arbiever-blockscout-proxy:latest
